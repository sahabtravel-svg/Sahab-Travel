<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الوجهة - سحاب ترافيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-blue-600 font-bold text-xl">سحاب ترافيل</a>
            <a href="index.html" class="text-gray-600 hover:text-blue-600">العودة للرئيسية ←</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-white p-6 rounded-2xl shadow-lg">
            <div class="rounded-xl overflow-hidden">
                <img id="trip-image" src="" class="w-full h-96 object-cover">
            </div>

            <div class="flex flex-col justify-between">
                <div>
                    <h1 id="trip-title" class="text-3xl font-bold text-gray-800 mb-4">جاري التحميل...</h1>
                    <p id="trip-desc" class="text-gray-600 mb-6"></p>
                    <div class="text-2xl font-bold text-blue-600 mb-4">السعر: <span id="trip-price"></span></div>
                </div>
                <button class="bg-blue-600 text-white py-3 rounded-xl font-bold">تأكيد الحجز</button>
            </div>
        </div>
    </main>

    <script>
        // قاعدة بيانات بسيطة للرحلات
        const trips = {
            'dubai': {
                title: 'دبي - الإمارات',
                desc: 'استمتع بإقامة فاخرة في مدينة المستقبل، شاملة زيارة برج خليفة والنافورة الراقصة.',
                price: '$299',
                image: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=800'
            },
            'london': {
                title: 'لندن - بريطانيا',
                desc: 'جولة تاريخية في معالم لندن العريقة، ساعة بيغ بين ونهر التايمز الساحر.',
                price: '$550',
                image: 'https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=800'
            }
        };

        // دالة قراءة اسم الرحلة من الرابط (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const tripId = urlParams.get('id');

        if (trips[tripId]) {
            const trip = trips[tripId];
            document.getElementById('trip-title').innerText = trip.title;
            document.getElementById('trip-desc').innerText = trip.desc;
            document.getElementById('trip-price').innerText = trip.price;
            document.getElementById('trip-image').src = trip.image;
        } else {
            document.getElementById('trip-title').innerText = 'الرحلة غير موجودة';
        }
    </script>
</body>
</html>
