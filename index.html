<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahab Travel | سحاب ترافل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafb; font-family: 'Tajawal', sans-serif; margin: 0; direction: rtl; }
        header { background: white; padding: 15px; text-align: center; border-bottom: 1px solid #eef2f4; }
        .logo-img { width: 90px; display: block; margin: 0 auto 5px; }
        
        /* حاوية الأزرار الكبيرة */
        .services-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        
        /* حاوية الأزرار الصغيرة */
        .small-services { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 15px 20px; }
        
        /* تصميم البطاقة (Card) */
        .card { background: white; border: 1px solid #eef2f4; border-radius: 12px; padding: 15px 5px; text-align: center; text-decoration: none; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .card:active { transform: scale(0.95); background-color: #f0f7ff; }

        /* أيقونات تشبه أسلوب المسافر (خطوط زرقاء) */
        .main-icon { width: 45px; height: 45px; margin-bottom: 8px; }
        .sub-icon { width: 30px; height: 30px; margin-bottom: 5px; }
        
        .card span { font-weight: bold; color: #1a1a1a; font-size: 13px; }
        .section-title { padding: 0 15px; font-weight: bold; color: #4a4a4a; margin-top: 15px; font-size: 14px; }
        
        /* المساعد الذكي */
        .ai-section { background: #1a2b3c; margin: 15px; padding: 20px; border-radius: 15px; color: white; text-align: center; }
        .ai-input-container { display: flex; gap: 8px; margin-top: 12px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: none; outline: none; font-family: 'Tajawal'; }
        button { padding: 10px 15px; border-radius: 8px; border: none; background: #ffffff; color: #1a2b3c; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <img src="IMG_0223.jpeg" class="logo-img">
    <h1 style="color: #005271; font-size: 18px; margin: 0;">Sahab Travel</h1>
</header>

<div class="services-container">
    <a href="https://www.skyscanner.net" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/201/201623.png" class="main-icon">
        <span>طيران</span>
    </a>
    <a href="https://www.booking.com" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3030/3030335.png" class="main-icon">
        <span>الإقامة</span>
    </a>
    <div class="card" style="position: relative;">
        <span style="background: #4caf50; color: white; font-size: 8px; padding: 1px 4px; border-radius: 3px; position: absolute; top: 8px; right: 8px;">جديد</span>
        <img src="https://cdn-icons-png.flaticon.com/512/3513/3513019.png" class="main-icon">
        <span>أنشطة</span>
    </div>
</div>

<p class="section-title">المزيد من الخدمات</p>
<div class="small-services">
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png" class="sub-icon">
        <span style="font-size: 11px;">سيارات</span>
    </div>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3119/3119338.png" class="sub-icon">
        <span style="font-size: 11px;">قطار</span>
    </div>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/912/912667.png" class="sub-icon">
        <span style="font-size: 11px;">كروز</span>
    </div>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2311/2311524.png" class="sub-icon">
        <span style="font-size: 11px;">المزيد</span>
    </div>
</div>

<div class="ai-section">
    <h3 style="margin: 0; font-size: 16px;">🤖 مساعد سحاب الذكي</h3>
    <p style="font-size: 12px; opacity: 0.8; margin: 5px 0;">خطط لرحلتك القادمة بالذكاء الاصطناعي</p>
    <div class="ai-input-container">
        <input type="text" placeholder="مثلاً: رحلة لليابان بـ 10 آلاف">
        <button>إرسال</button>
    </div>
</div>

</body>
</html>
