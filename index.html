<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحاب ترافيل | وجهتك القادمة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { background: white !important; color: #1e3a8a !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-900 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-white font-black text-2xl tracking-tighter">سحاب <span class="text-orange-400">ترافيل</span></div>
            <button class="text-white"><i data-lucide="menu"></i></button>
        </div>
    </nav>

    <div class="bg-blue-900 pt-10 pb-24 px-4">
        <div class="container mx-auto text-center mb-8">
            <h1 class="text-white text-2xl font-black mb-2">أهلاً بك، أين وجهتك القادمة؟</h1>
        </div>

        <div class="container mx-auto grid grid-cols-3 gap-3 max-w-md">
            <button onclick="switchTab(this, 'flights')" class="tab-btn tab-active rounded-2xl p-4 flex flex-col items-center transition-all">
                <i data-lucide="plane" class="mb-2"></i>
                <span class="text-xs font-bold">طيران</span>
            </button>
            <button onclick="switchTab(this, 'hotels')" class="tab-btn bg-white/10 text-white rounded-2xl p-4 flex flex-col items-center transition-all">
                <i data-lucide="hotel" class="mb-2"></i>
                <span class="text-xs font-bold">فنادق</span>
            </button>
            <button onclick="switchTab(this, 'cars')" class="tab-btn bg-white/10 text-white rounded-2xl p-4 flex flex-col items-center transition-all">
                <i data-lucide="car" class="mb-2"></i>
                <span class="text-xs font-bold">سيارات</span>
            </button>
        </div>
    </div>

    <div class="container mx-auto px-4 -mt-16">
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100 max-w-xl mx-auto">
            <div class="space-y-5">
                <div class="flex flex-col border-b border-gray-100 pb-2">
                    <label id="location-label" class="text-xs font-bold text-blue-600 mb-1 uppercase">المغادرة من</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" class="text-gray-300" size="18"></i>
                        <input type="text" id="mainInput" placeholder="من أين ستغادر؟" class="w-full outline-none font-bold text-gray-800">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col border-b border-gray-100 pb-2">
                        <label class="text-xs font-bold text-blue-600 mb-1 uppercase">التاريخ</label>
                        <input type="date" class="outline-none font-bold text-gray-700 bg-transparent text-sm">
                    </div>
                    <div id="extra-field" class="flex flex-col border-b border-gray-100 pb-2">
                        <label class="text-xs font-bold text-blue-600 mb-1 uppercase">المسافرون</label>
                        <select class="outline-none font-bold text-gray-700 bg-transparent text-sm">
                            <option>1 مسافر</option>
                            <option>2 مسافر</option>
                        </select>
                    </div>
                </div>

                <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-orange-200 active:scale-95 transition-all">
                    ابحث الآن
                </button>
            </div>
        </div>
    </div>

    <section class="py-12">
        <div class="container mx-auto px-4 flex justify-between items-center mb-6">
            <h2 class="text-xl font-black text-gray-800 tracking-tight">أفضل العروض الحالية</h2>
            <span class="text-blue-600 text-sm font-bold">عرض الكل</span>
        </div>

        <div class="flex overflow-x-auto gap-4 px-4 pb-4 no-scrollbar">
            <a href="details.html?id=dubai" class="min-w-[280px] bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden shrink-0">
                <div class="relative h-40">
                    <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=500" class="w-full h-full object-cover">
                    <div class="absolute top-3 right-3 bg-orange-500 text-white text-[10px] font-bold px-2 py-1 rounded-full uppercase">عرض محدود</div>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-gray-800 mb-1 text-lg">دبي، الإمارات</h3>
                    <p class="text-blue-600 font-black">$299 <span class="text-gray-400 text-xs font-normal">/ للشخص</span></p>
                </div>
            </a>

            <a href="details.html?id=london" class="min-w-[280px] bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden shrink-0">
                <div class="relative h-40">
                    <img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=500" class="w-full h-full object-cover">
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-gray-800 mb-1 text-lg">لندن، بريطانيا</h3>
                    <p class="text-blue-600 font-black">$550 <span class="text-gray-400 text-xs font-normal">/ للشخص</span></p>
                </div>
            </a>
        </div>
    </section>

    <footer class="bg-gray-100 py-10 text-center text-gray-400 text-sm font-bold">
        <p>© 2026 سحاب ترافيل - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        lucide.createIcons();

        function switchTab(element, type) {
            // تنسيق الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active', 'text-blue-900');
                btn.classList.add('bg-white/10', 'text-white');
            });
            element.classList.add('tab-active');
            element.classList.remove('bg-white/10', 'text-white');

            // تغيير النصوص
            const label = document.getElementById('location-label');
            const input = document.getElementById('mainInput');
            const extraField = document.getElementById('extra-field');

            if (type === 'flights') {
                label.innerText = 'المغادرة من';
                input.placeholder = 'من أين ستغادر؟';
                extraField.style.display = 'flex';
            } else if (type === 'hotels') {
                label.innerText = 'الإقامة في';
                input.placeholder = 'أين تريد الإقامة؟';
                extraField.style.display = 'flex';
            } else if (type === 'cars') {
                label.innerText = 'مكان الاستلام';
                input.placeholder = 'المطار أو فرع التأجير';
                extraField.style.display = 'none';
            }
        }
    </script>
</body>
</html>
