<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحاب ترافيل - بوابتك للعالم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
        }
        .tab-active { background-color: #f7941d !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="fixed top-0 w-full z-50 bg-white/10 backdrop-blur-md px-6 py-4 flex justify-between items-center text-white">
        <div class="text-2xl font-black">سحاب ترافيل</div>
        
        <button id="menuBtn" class="p-2 hover:bg-white/20 rounded-lg transition">
            <i data-lucide="menu" size="28"></i>
        </button>
    </nav>

    <div id="sidebar" class="fixed top-0 -right-full w-72 h-full bg-white z-[60] shadow-2xl transition-all duration-300 p-6 text-gray-800">
        <div class="flex justify-between items-center mb-10">
            <span class="text-xl font-black text-blue-900">القائمة</span>
            <button id="closeBtn"><i data-lucide="x" class="text-gray-500"></i></button>
        </div>
        
        <nav class="flex flex-col gap-6 text-lg font-bold">
            <a href="index.html" class="flex items-center gap-3 text-orange-500"><i data-lucide="home"></i> الرئيسية</a>
            <a href="#" class="flex items-center gap-3 hover:text-orange-500"><i data-lucide="plane"></i> حجز طيران</a>
            <a href="#" class="flex items-center gap-3 hover:text-orange-500"><i data-lucide="hotel"></i> حجز فنادق</a>
            <a href="#" class="flex items-center gap-3 hover:text-orange-500"><i data-lucide="car"></i> تأجير سيارات</a>
            <a href="#" class="flex items-center gap-3 hover:text-orange-500"><i data-lucide="phone"></i> اتصل بنا</a>
        </nav>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/50 z-[55] hidden"></div>

    <header class="hero-bg min-h-[80vh] flex flex-col items-center justify-center text-white px-4 relative">
        <h1 class="text-4xl md:text-6xl font-black text-center mb-4">مستشارك الأول للسفر</h1>
        <p class="text-lg md:text-xl mb-10 opacity-90 text-center">احجز طيرانك، فندقك، وسيارتك في مكان واحد</p>

        <div class="w-full max-w-5xl z-10">
            <div class="flex flex-wrap justify-center gap-2 mb-0">
                <button onclick="switchTab(this, 'طيران')" class="tab-btn tab-active bg-white/20 backdrop-blur-md px-6 py-3 rounded-t-2xl font-bold flex items-center gap-2 transition-all">
                    <i data-lucide="plane"></i> طيران
                </button>
                <button onclick="switchTab(this, 'فنادق')" class="tab-btn bg-white/10 backdrop-blur-md px-6 py-3 rounded-t-2xl font-bold flex items-center gap-2 transition-all">
                    <i data-lucide="hotel"></i> فنادق
                </button>
                <button onclick="switchTab(this, 'سيارات')" class="tab-btn bg-white/10 backdrop-blur-md px-6 py-3 rounded-t-2xl font-bold flex items-center gap-2 transition-all">
                    <i data-lucide="car"></i> سيارات
                </button>
            </div>

            <div class="bg-white p-6 rounded-2xl md:rounded-tr-none shadow-2xl grid grid-cols-1 md:grid-cols-4 gap-4 text-gray-800">
                <div class="flex flex-col border-l border-gray-100 pl-4">
                    <label class="text-xs font-bold text-orange-500 mb-1">الموقع / المطار</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" class="text-gray-400" size="18"></i>
                        <input type="text" id="mainInput" placeholder="من أين؟" class="w-full outline-none font-bold">
                    </div>
                </div>
                <div class="flex flex-col border-l border-gray-100 pl-4">
                    <label class="text-xs font-bold text-orange-500 mb-1">التاريخ</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="calendar" class="text-gray-400" size="18"></i>
                        <input type="date" class="w-full outline-none font-bold bg-transparent">
                    </div>
                </div>
                <div class="flex flex-col border-l border-gray-100 pl-4">
                    <label class="text-xs font-bold text-orange-500 mb-1">المسافرون</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="users" class="text-gray-400" size="18"></i>
                        <select class="w-full outline-none font-bold bg-transparent">
                            <option>1 بالغ</option>
                            <option>2 بالغين</option>
                            <option>عائلة</option>
                        </select>
                    </div>
                </div>
                <button class="bg-[#f7941d] hover:bg-orange-600 text-white font-black py-4 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="search"></i> بحث الآن
                </button>
            </div>
        </div>
    </header>

    <section class="py-16 px-6 max-w-6xl mx-auto">
        <h2 class="text-3xl font-black mb-8 text-gray-800">أفضل العروض الحالية</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <a href="details.html" class="bg-white rounded-3xl overflow-hidden shadow-xl group">
                <div class="h-60 overflow-hidden relative">
                    <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute top-4 left-4 bg-orange-500 text-white px-3 py-1 rounded-full text-xs font-bold">أكثر طلباً</div>
                </div>
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2">دبي - الإمارات</h3>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-blue-900">$299</span>
                        <span class="text-gray-400 text-sm">5 أيام</span>
                    </div>
                </div>
            </a>
        </div>
    </section>

    <footer class="bg-blue-900 text-white py-8 text-center">
        <p class="font-bold">© 2026 سحاب ترافيل - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        lucide.createIcons();

        function switchTab(element, type) {
            // مسح التنسيق من كل الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('bg-white/10');
            });
            // تفعيل الزر المختار
            element.classList.add('tab-active');
            element.classList.remove('bg-white/10');

            // تغيير نص الإدخال
            const input = document.getElementById('mainInput');
            if(type === 'فنادق') input.placeholder = "اسم الفندق أو المدينة";
            else if(type === 'سيارات') input.placeholder = "مكان استلام السيارة";
            else input.placeholder = "مطار المغادرة أو الوصول";
        }
    </        // أوامر القائمة الجانبية
        const menuBtn = document.getElementById('menuBtn');
        const closeBtn = document.getElementById('closeBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        menuBtn.onclick = () => {
            sidebar.classList.remove('-right-full');
            sidebar.classList.add('right-0');
            overlay.classList.remove('hidden');
        };

        closeBtn.onclick = overlay.onclick = () => {
            sidebar.classList.remove('right-0');
            sidebar.classList.add('-right-full');
            overlay.classList.add('hidden');
        };
>
</body>
</html>
