<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحاب ترافيل - بوابتك للعالم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="absolute w-full z-20 flex items-center justify-between px-6 md:px-12 py-6 text-white">
        <div class="flex items-center gap-2 text-2xl font-extrabold tracking-tight">
            <i data-lucide="plane-takeoff" class="text-blue-400"></i>
            <span>سحاب ترافيل</span>
        </div>
        <div class="hidden md:flex space-x-reverse space-x-8 font-semibold">
            <a href="#" class="hover:text-blue-400 transition">الرئيسية</a>
            <a href="#destinations" class="hover:text-blue-400 transition">الوجهات</a>
            <a href="#" class="hover:text-blue-400 transition">العروض المباشرة</a>
            <a href="#" class="hover:text-blue-400 transition">اتصل بنا</a>
        </div>
        <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-full font-bold transition shadow-lg">حجز سريع</button>
    </nav>

    <header class="hero-bg h-[90vh] flex flex-col items-center justify-center text-white px-4 relative">
        <h1 class="text-5xl md:text-7xl font-extrabold text-center mb-6 drop-shadow-lg">سافر بكل حرية</h1>
        <p class="text-xl md:text-2xl mb-12 opacity-90 font-light">استكشف أكثر من 500 وجهة سياحية حول العالم بأفضل الأسعار</p>

        <div class="bg-white p-2 md:p-4 rounded-3xl shadow-2xl w-full max-w-5xl grid grid-cols-1 md:grid-cols-4 gap-2 text-gray-800 border-4 border-white/20 backdrop-blur-sm">
            <div class="flex items-center gap-3 p-3 border-b md:border-b-0 md:border-l border-gray-100">
                <i data-lucide="map-pin" class="text-blue-600"></i>
                <div class="flex flex-col flex-1">
                    <span class="text-xs font-bold text-gray-400">الوجهة</span>
                    <input type="text" placeholder="إلى أين؟" class="outline-none text-sm font-bold placeholder-gray-300">
                </div>
            </div>
            <div class="flex items-center gap-3 p-3 border-b md:border-b-0 md:border-l border-gray-100">
                <i data-lucide="calendar" class="text-blue-600"></i>
                <div class="flex flex-col flex-1">
                    <span class="text-xs font-bold text-gray-400">تاريخ الذهاب</span>
                    <input type="date" class="outline-none text-sm font-bold bg-transparent">
                </div>
            </div>
            <div class="flex items-center gap-3 p-3 border-b md:border-b-0 md:border-l border-gray-100">
                <i data-lucide="users" class="text-blue-600"></i>
                <div class="flex flex-col flex-1">
                    <span class="text-xs font-bold text-gray-400">المسافرون</span>
                    <select class="outline-none text-sm font-bold bg-transparent cursor-pointer">
                        <option>1 مسافر</option>
                        <option>2 مسافرين</option>
                        <option>عائلة</option>
                    </select>
                </div>
            </div>
            <button class="bg-blue-600 text-white font-bold rounded-2xl py-4 hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-inner">
                <i data-lucide="search" size="20"></i>
                ابحث عن رحلتي
            </button>
        </div>
    </header>

    <section id="destinations" class="py-20 px-6 md:px-12 bg-white">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h2 class="text-4xl font-extrabold text-gray-900 mb-2">أشهر الوجهات المختارة</h2>
                <div class="h-1.5 w-20 bg-blue-600 rounded-full"></div>
            </div>
            <a href="#" class="text-blue-600 font-bold hover:underline">عرض الكل</a>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                <section id="destinations" class="py-20 px-6 md:px-12 bg-gray-50">
        <div class="text-right mb-12">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">أحدث العروض السياحية</h2>
            <div class="h-1 w-20 bg-[#004a99] rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <a href="details.html" class="group bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 block overflow-hidden border border-gray-100">
                <div class="relative overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1518684666903-c336340397d6?auto=format&fit=crop&w=600&q=80" class="h-64 w-full object-cover group-hover:scale-105 transition duration-500">
                    <div class="absolute top-4 right-4 bg-[#004a99] text-white text-xs font-bold px-3 py-1 rounded-full">خصم 20%</div>
                </div>
                <div class="p-6 text-right">
                    <h3 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-[#004a99] transition">دبي - الإمارات العربية المتحدة</h3>
                    <div class="flex items-center gap-2 text-gray-500 text-sm mb-4">
                        <i data-lucide="map-pin" size="14"></i>
                        <span>برامج عائلية مميزة</span>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-gray-50">
                        <div class="text-[#004a99] font-black text-2xl">$299</div>
                        <div class="flex items-center gap-1 text-gray-400 text-xs">
                            <i data-lucide="calendar" size="14"></i>
                            <span>5 أيام</span>
                        </div>
                    </div>
                </div>
            </a>

            </div>
    </section>
