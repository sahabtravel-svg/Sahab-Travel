    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .bg-sahab-blue { background-color: #004a99; }
        .text-sahab-blue { color: #004a99; }
        .bg-sahab-orange { background-color: #f7941d; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="absolute w-full z-20 flex items-center justify-between px-6 py-6 text-white">
        <div class="flex items-center gap-2 text-2xl font-extrabold">

        </div>
    </nav>

    <header class="hero-bg min-h-[90vh] flex flex-col items-center justify-center text-white px-4 pt-20">
        <h1 class="text-4xl md:text-6xl font-extrabold text-center mb-4">مستشارك الأول للسفر</h1>
        <p class="text-lg opacity-90 mb-10 text-center">خطط لرحلتك القادمة بكل سهولة واحترافية</p>
        
        <div class="w-full max-w-4xl">
            <div class="flex flex-wrap justify-center gap-2 mb-2">
                <button class="tab-btn bg-sahab-orange text-white px-4 py-2 rounded-t-xl font-bold text-xs md:text-sm flex items-center gap-2">
                    <i data-lucide="plane" size="16"></i> طيران
                </button>
                <button class="tab-btn bg-white/30 backdrop-blur-md text-white px-4 py-2 rounded-t-xl font-bold text-xs md:text-sm flex items-center gap-2">

                </button>
                <button class="tab-btn bg-white/30 backdrop-blur-md text-white px-4 py-2 rounded-t-xl font-bold text-xs md:text-sm flex items-center gap-2">
                    <i data-lucide="car" size="16"></i> سيارات
                </button>
            </div>

            <div class="bg-white p-4 md:p-6 rounded-2xl md:rounded-tr-none shadow-2xl grid grid-cols-1 md:grid-cols-4 gap-4 text-gray-800">
                <div class="border-b md:border-b-0 md:border-l border-gray-100 pb-2 md:pb-0">
                    <label class="text-[10px] font-bold text-sahab-blue block mb-1">الوجهة</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" size="18" class="text-gray-400"></i>
                        <input type="text" id="destInput" placeholder="إلى أين؟" class="outline-none text-sm font-bold w-full">
                    </div>
                </div>
                <div class="border-b md:border-b-0 md:border-l border-gray-100 pb-2 md:pb-0">
                    <label class="text-[10px] font-bold text-sahab-blue block mb-1">التاريخ</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="calendar" size="18" class="text-gray-400"></i>
                        <input type="date" class="outline-none text-sm font-bold w-full bg-transparent">
                    </div>
                </div>
                <div class="border-b md:border-b-0 md:border-l border-gray-100 pb-2 md:pb-0">
                    <label class="text-[10px] font-bold text-sahab-blue block mb-1">المسافرون</label>
                    <div class="flex items-center gap-2">
                        <i data-lucide="users" size="18" class="text-gray-400"></i>
                        <select class="outline-none text-sm font-bold w-full bg-transparent"><option>1 مسافر</option><option>2 مسافر</option></select>
                    </div>
                </div>
                <button class="bg-sahab-orange text-white font-bold rounded-xl py-4 shadow-lg hover:bg-orange-600 transition flex items-center justify-center gap-2">
                    <i data-lucide="search" size="20"></i> بحث الآن
                </button>
            </div>
        </div>
    </header>

    <section id="destinations" class="py-20 px-6 md:px-12">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

                    <div class="absolute top-4 right-4 bg-sahab-orange text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">خصم 20%</div>
                </div>
                <div class="p-6 text-right">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">دبي - الإمارات</h3>
                    <div class="flex justify-between items-center text-sahab-blue">
                        <span class="text-2xl font-black">$299</span>

                    </div>
                </div>
            </a>
            </div>
    </section>
