<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahab Travel | سحاب للسفر الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Sahab<span>Travel</span></div>
            <ul>
                <li><a href="#">الرئيسية</a></li>
                <li><a href="#">رحلاتي</a></li>
                <li><a href="#">الدعم الذكي</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>سافر بذكاء مع <span class="highlight">سحاب</span></h1>
            <p>نستخدم الذكاء الاصطناعي لنتنقى لك أفضل العروض العالمية</p>
        </section>

        <section class="booking-section">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab(event, 'flights')">✈️ طيران</button>
                <button class="tab-btn" onclick="openTab(event, 'hotels')">🏨 فنادق</button>
                <button class="tab-btn" onclick="openTab(event, 'cars')">🚗 سيارات</button>
                <button class="tab-btn" onclick="openTab(event, 'cruise')">🚢 كروز</button>
            </div>

            <div id="flights" class="tab-content active">
                <div class="search-grid">
                    <input type="text" placeholder="من (المطار)">
                    <input type="text" placeholder="إلى (الوجهة)">
                    <input type="date">
                    <button class="main-btn">بحث عن رحلات</button>
                </div>
            </div>

            <div id="hotels" class="tab-content">
                <div class="search-grid">
                    <input type="text" placeholder="المدينة أو اسم الفندق">
                    <input type="date" placeholder="وصول">
                    <input type="date" placeholder="مغادرة">
                    <button class="main-btn">بحث عن فنادق</button>
                </div>
            </div>
            
            </section>

        <section class="ai-assistant">
            <div class="ai-card">
                <h3>🤖 مساعد سحاب الذكي</h3>
                <p>اكتب ميزانيتك ووجهتك واترك التخطيط لنا..</p>
                <div class="ai-input">
                    <input type="text" placeholder="مثلاً: خطط لي شهر عسل في ماليزيا بـ 10 آلاف ريال">
                    <button>إرسال</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
