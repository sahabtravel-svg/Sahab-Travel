<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الرحلة - سحاب ترافيل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .bg-sahab-blue { background-color: #004a99; }
        .text-sahab-blue { color: #004a99; }
        .bg-sahab-orange { background-color: #f7941d; }
        .border-sahab-blue { border-color: #004a99; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm p-6 flex justify-between items-center border-b-4 border-sahab-blue">
        <a href="index.html" class="flex items-center gap-2 text-sahab-blue font-bold hover:text-blue-800 transition">
            <i data-lucide="arrow-right"></i> العودة للرئيسية
        </a>
        <div class="font-black text-2xl text-sahab-blue">سحاب ترافيل</div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-10 mt-10">
        <div class="lg:col-span-2">
            <div class="relative">
                <img src="https://images.unsplash.com/photo-1518684666903-c336340397d6?auto=format&fit=crop&w=1200&q=80" class="w-full h-[450px] object-cover rounded-[2.5rem] shadow-2xl mb-8">
                <span class="absolute top-6 right-6 bg-sahab-orange text-white px-6 py-2 rounded-full font-bold shadow-lg">أكثر طلباً</span>
            </div>
            
<img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1200&q=80" class="w-full h-[300px] md:h-[450px] object-cover rounded-[2.5rem] shadow-2xl mb-8">

            <p class="text-gray-600 leading-relaxed text-lg mb-8 italic border-r-4 border-sahab-orange pr-4">
                استمتع بإقامة فاخرة في أرقى فنادق دبي مع جولات سياحية خاصة تشمل تذاكر دخول المعالم الرئيسية.
            </p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white p-6 rounded-2xl text-center shadow-sm border border-gray-100">
                    <i data-lucide="clock" class="mx-auto text-sahab-orange mb-3"></i>
                    <span class="block font-bold text-gray-800">5 أيام</span>
                </div>
                <div class="bg-white p-6 rounded-2xl text-center shadow-sm border border-gray-100">
                    <i data-lucide="plane" class="mx-auto text-sahab-orange mb-3"></i>
                    <span class="block font-bold text-gray-800">طيران داخلي</span>
                </div>
                <div class="bg-white p-6 rounded-2xl text-center shadow-sm border border-gray-100">
                    <i data-lucide="hotel" class="mx-auto text-sahab-orange mb-3"></i>
                    <span class="block font-bold text-gray-800">فندق 5 نجوم</span>
                </div>
                <div class="bg-white p-6 rounded-2xl text-center shadow-sm border border-gray-100">
                    <i data-lucide="users" class="mx-auto text-sahab-orange mb-3"></i>
                    <span class="block font-bold text-gray-800">مرشد سياحي</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 h-fit sticky top-10">
            <div class="text-center mb-8">
                <p class="text-gray-400 text-sm mb-1 uppercase tracking-widest">سعر الشخص يبدأ من</p>
                <div class="text-5xl font-black text-sahab-blue">$299</div>
            </div>
            
            <div class="space-y-4">
                <button class="w-full bg-sahab-orange text-white font-black py-5 rounded-2xl hover:scale-105 transition-transform shadow-xl shadow-orange-200 text-xl">
                    احجز مقعدك الآن
                </button>
                <button class="w-full bg-sahab-blue text-white font-bold py-4 rounded-2xl hover:bg-blue-800 transition">
                    تحميل جدول الرحلة (PDF)
                </button>
            </div>
            
            <div class="mt-8 flex items-center justify-center gap-2 text-gray-400 text-sm">
                <i data-lucide="lock" size="14"></i>
                <span>دفع آمن 100%</span>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
