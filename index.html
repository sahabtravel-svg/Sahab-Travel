<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سياحة - اكتشف العالم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1353&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="absolute w-full z-10 flex items-center justify-between px-10 py-6 text-white">
        <div class="text-3xl font-extrabold tracking-wider">تـرحـال</div>
        <div class="hidden md:flex space-x-reverse space-x-8 font-medium">
            <a href="#" class="hover:text-blue-200 transition">الرحلات</a>
            <a href="#" class="hover:text-blue-200 transition">الفنادق</a>
            <a href="#" class="hover:text-blue-200 transition">العروض</a>
            <a href="#" class="hover:text-blue-200 transition">من نحن</a>
        </div>
        <button class="bg-white text-blue-900 px-6 py-2 rounded-lg font-bold hover:bg-blue-50 transition shadow-lg">دخول</button>
    </nav>

    <header class="hero-bg h-screen flex flex-col items-center justify-center text-white px-4">
        <h1 class="text-4xl md:text-6xl font-extrabold text-center mb-6 leading-tight">اكتشف وجهتك القادمة</h1>
        <p class="text-xl mb-10 opacity-90">أفضل عروض السفر والرحلات السياحية حول العالم</p>

        <div class="bg-white p-4 rounded-2xl shadow-2xl w-full max-w-4xl grid grid-cols-1 md:grid-cols-4 gap-4 text-gray-800">
            <div class="flex flex-col border-l border-gray-200 px-2 text-right">
                <label class="text-xs font-bold text-blue-600 mb-1">الوجهة</label>
                <input type="text" placeholder="إلى أين تريد الذهاب؟" class="outline-none text-sm">
            </div>
            <div class="flex flex-col border-l border-gray-200 px-2 text-right">
                <label class="text-xs font-bold text-blue-600 mb-1">التاريخ</label>
                <input type="date" class="outline-none text-sm bg-transparent">
            </div>
            <div class="flex flex-col border-l border-gray-200 px-2 text-right">
                <label class="text-xs font-bold text-blue-600 mb-1">المسافرون</label>
                <select class="outline-none text-sm bg-transparent">
                    <option>2 بالغين</option>
                    <option>1 بالغ</option>
                    <option>عائلة</option>
                </select>
            </div>
            <button class="bg-blue-600 text-white font-bold rounded-xl py-3 hover:bg-blue-700 transition">بحث عن رحلات</button>
        </div>
    </header>

    <section class="py-20 px-10">
        <h2 class="text-3xl font-bold text-gray-800 mb-10 text-right">أشهر الوجهات حالياً</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="group overflow-hidden rounded-3xl shadow-lg bg-white cursor-pointer transform hover:-translate-y-2 transition">
                <img src="https://images.unsplash.com/photo-1533929736458-ca588d08c8be?auto=format&fit=crop&w=600&q=80" class="h-64 w-full object-cover">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-blue-600 font-bold">لندن</span>
                        <span class="text-gray-500 text-sm">ابتداءً من $450</span>
                    </div>
                    <p class="text-gray-600 text-sm">استمتع بجمال الضباب والمعالم التاريخية في قلب بريطانيا.</p>
                </div>
            </div>
            </div>
    </section>

</body>
</html>
