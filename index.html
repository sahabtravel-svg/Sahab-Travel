<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحاب ترافل | Sahab Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #005271; --accent: #ff9800; --bg: #f7f9fc; --text: #333; }
        body { background-color: var(--bg); font-family: 'Tajawal', sans-serif; margin: 0; padding-bottom: 30px; }
        
        header { background: white; padding: 20px; text-align: center; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        .logo { width: 150px; height: auto; display: block; margin: 0 auto; }

        .main-grid, .sub-grid { display: grid; gap: 12px; padding: 15px; }
        .main-grid { grid-template-columns: repeat(3, 1fr); }
        .sub-grid { grid-template-columns: repeat(4, 1fr); margin-top: -10px; }

        .card { background: white; border-radius: 12px; padding: 15px 5px; text-align: center; 
                text-decoration: none; color: var(--text); border: 1px solid #eef1f5;
                transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card:active { transform: scale(0.95); }
        
        /* ضبط حجم الأيقونات لتكون واضحة وملونة */
        .card img { width: 45px; height: 45px; margin-bottom: 10px; object-fit: contain; }
        .card span { font-weight: bold; font-size: 14px; color: #1a1a1a; }
        
        .section-title { padding: 20px 20px 0; font-weight: bold; color: var(--primary); font-size: 16px; margin-bottom: 5px; }

        .ai-box { background: linear-gradient(135deg, #005271 0%, #002d3e 100%); 
                  margin: 15px; padding: 25px; border-radius: 18px; color: white; text-align: center; }
        input { width: 85%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; outline: none; text-align: center; font-family: 'Tajawal'; }
        
        .btn-send { background: var(--accent); color: white; border: none; padding: 12px 30px; 
                    border-radius: 8px; font-weight: bold; width: 85%; cursor: pointer; font-family: 'Tajawal'; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <img src="logo.svg" alt="Sahab Travel" class="logo">
</header>

<div class="main-grid">
    <a href="#" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3125/3125713.png">
        <span>طيران</span>
    </a>
    <a href="#" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2983/2983803.png">
        <span>فنادق</span>
    </a>
    <a href="#" class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/3125/3125867.png">
        <span>أنشطة</span>
    </a>
</div>

<p class="section-title">خدمات إضافية</p>
<div class="sub-grid">
    <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png"><span>سيارات</span></div>
    <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/723/723847.png"><span>قطار</span></div>
    <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/3104/3104868.png"><span>كروز</span></div>
    <div class="card"><img src="https://cdn-icons-png.flaticon.com/512/570/570223.png"><span>المزيد</span></div>
</div>

<div class="ai-box">
    <h3>🤖 مساعد سحاب الذكي</h3>
    <p>خطط لرحلتك القادمة في ثوانٍ</p>
    <form action="هنا_تضعين_رابط_FORM_SPREE" method="POST">
        <input type="text" name="destination" placeholder="إلى أين تريد الذهاب؟ (مثلاً: تركيا)" required>
        <input type="text" name="budget" placeholder="الميزانية التقريبية" required>
        <input type="text" name="contact" placeholder="رقم الواتساب للرد عليك" required>
        <button type="submit" class="btn-send">طلب عرض سعر</button>
    </form>
</div>

</body>
</html>
