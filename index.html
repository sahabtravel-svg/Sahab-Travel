<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحاب ترافيل - بوابتك للعالم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .bg-sahab { background-color: #004a99; }
        .text-sahab { color: #004a99; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="absolute w-full z-20 flex items-center justify-between px-6 md:px-12 py-6 text-white">
        <div class="flex items-center gap-2 text-2xl font-extrabold">
            <i data-lucide="plane-takeoff" class="text-blue-400"></i>
            <span>سحاب ترافيل</span>
        </div>
        <div class="hidden md:flex space-x-reverse space-x-8 font-semibold">
            <a href="#" class="hover:text-blue-400 transition">الرئيسية</a>
            <a href="#destinations" class="hover:text-blue-400 transition">الوجهات</a>
            <a href="#" class="hover:text-blue-400 transition">اتصل بنا</a>
        </div>
        <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">حجز سريع</button>
    </nav>

    <header class="hero-bg h-[80vh] flex flex-col items-center justify-center text-white px-4">
        <h1 class="text-5xl md:text-6xl font-extrabold text-center mb-4">اكتشف العالم مع سحاب</h1>
        <p class="text-xl opacity-90 mb-10 text-center">أفضل العروض والوجهات السياحية بين يديك</p>
        
        <div class="bg-white p-4 rounded-2xl shadow-2xl w-full max-w-4xl grid grid-cols-1 md:grid-cols-4 gap-4 text-gray-800">
            <div class="border-l border-gray-100 px-2">
                <label class="text-xs font-bold text-sahab block mb-1 uppercase">الوجهة</label>
                <input type="text" placeholder="إلى أين؟" class="outline-none text-sm w-full">
            </div>
            <div class="border-l border-gray-100 px-2">
                <label class="text-xs font-bold text-sahab block mb-1 uppercase">التاريخ</label>
                <input type="date" class="outline-none text-sm w-full bg-transparent">
            </div>
            <div class="border-l border-gray-100 px-2">
                <label class="text-xs font-bold text-sahab block mb-1 uppercase">المسافرون</label>
                <select class="outline-none text-sm w-full bg-transparent"><option>1 مسافر</option><option>2 مسافرين</option></select>
            </div>
            <button class="bg-sahab text-white font-bold rounded-xl py-3 hover:bg-blue-800 transition">بحث</button>
        </div>
    </header>

    <section id="destinations" class="py-20 px-6 md:px-12">
        <h2 class="text-3xl font-bold text-gray-900 mb-8 text-right border-r-4 border-sahab pr-4">أشهر الوجهات</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <a href="details.html" class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden block">
                <div class="relative h-64 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1518684666903-c336340397d6?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                    <div class="absolute top-4 right-4 bg-sahab text-white text-xs font-bold px-3 py-1 rounded-full">عرض خاص</div>
                </div>
                <div class="p-6 text-right">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">دبي - الإمارات</h3>
                    <div class="flex justify-between items-center text-sahab">
                        <span class="text-2xl font-black">$299</span>
                        <span class="text-gray-400 text-sm flex items-center gap-1"><i data-lucide="clock" size="14"></i> 5 أيام</span>
                    </div>
                </div>
            </a>

            <a href="#" class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden block">
                <div class="relative h-64 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <div class="p-6 text-right">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">باريس - فرنسا</h3>
                    <div class="flex justify-between items-center text-sahab">
                        <span class="text-2xl font-black">$550</span>
                        <span class="text-gray-400 text-sm flex items-center gap-1"><i data-lucide="clock" size="14"></i> 7 أيام</span>
                    </div>
                </div>
            </a>

            <a href="#" class="group bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden block">
                <div class="relative h-64 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <div class="p-6 text-right">
                    <h3 class="text-xl font-bold text-gray-900 mb-2">لندن - بريطانيا</h3>
                    <div class="flex justify-between items-center text-sahab">
                        <span class="text-2xl font-black">$450</span>
                        <span class="text-gray-400 text-sm flex items-center gap-1"><i data-lucide="clock" size="14"></i> 6 أيام</span>
                    </div>
                </div>
            </a>

        </div>
    </section>

    <footer class="bg-gray-900 text-white py-10 text-center text-sm opacity-80">
        <p>© 2026 سحاب ترافيل - جميع الحقوق محفوظة</p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
