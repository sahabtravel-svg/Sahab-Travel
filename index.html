<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سحاب ترافيل | المسافرون العرب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-active { background: white !important; color: #1e3a8a !important; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: scale(1.05); }
        .sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <nav class="bg-blue-900 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex justify-between items-center text-white">
            <button onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
            <div class="font-black text-2xl tracking-tighter">سحاب <span class="text-orange-400">ترافيل</span></div>
            <div class="w-8"></div>
        </div>
    </nav>

    <div class="bg-blue-900 pt-8 pb-24 px-4 rounded-b-[40px]">
        <div class="container mx-auto text-center mb-8 text-white">
            <h1 class="text-2xl font-black mb-1">ابدأ رحلتك الآن</h1>
            <p class="text-blue-200 text-xs">احجز طيران، فنادق، وسيارات بأفضل الأسعار</p>
        </div>

        <div class="container mx-auto grid grid-cols-3 gap-3 max-w-md">
            <button onclick="switchTab(this, 'flights')" class="tab-btn tab-active rounded-2xl p-4 flex flex-col items-center transition-all">
                <i data-lucide="plane" class="mb-1"></i>
                <span class="text-xs font-bold">طيران</span>
            </button>
            <button onclick="switchTab(this, 'hotels')" class="tab-btn bg-white/10 text-white rounded-2xl p-4 flex flex-col items-center transition-all">
                <i data-lucide="hotel" class="mb-1"></i>
                <span class="text-xs font-bold">فنادق</span>
            </button>
            <button onclick="switchTab(this, 'cars')" class="tab-btn bg-white/10 text-white rounded-2xl p-4 flex flex-col items-center transition-all">
                <i data-lucide="car" class="mb-1"></i>
                <span class="text-xs font-bold">سيارات</span>
            </button>
        </div>
    </div>

    <div class="container mx-auto px-4 -mt-16 relative z-10">
        <div class="bg-white rounded-[32px] shadow-2xl p-6 border border-gray-100 max-w-xl mx-auto">
            <div class="space-y-6">
                <div id="from-container" class="flex flex-col border-b border-gray-100 pb-3 relative">
                    <label class="text-[10px] font-black text-blue-600 mb-1 uppercase text-right">من (المطار)</label>
                    <div class="flex items-center gap-3">
                        <i data-lucide="plane-takeoff" class="text-gray-300" size="20"></i>
                        <input type="text" id="fromInput" placeholder="مدينة المغادرة" class="w-full outline-none font-bold text-gray-800 text-lg" autocomplete="off">
                    </div>
                </div>

                <div class="flex flex-col border-b border-gray-100 pb-3 relative">
                    <label id="location-label" class="text-[10px] font-black text-blue-600 mb-1 uppercase text-right">إلى (الوجهة)</label>
                    <div class="flex items-center gap-3">
                        <i id="dest-icon" data-lucide="plane-landing" class="text-gray-300" size="20"></i>
                        <input type="text" id="toInput" placeholder="الوجهة" class="w-full outline-none font-bold text-gray-800 text-lg" autocomplete="off">
                    </div>
                </div>

                <button class="w-full bg-orange-500 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-orange-200 active:scale-95 transition-all">
                    ابحث الآن
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-around p-3 z-50">
        <div class="flex flex-col items-center text-blue-900 cursor-pointer"><i data-lucide="home" size="20"></i><span class="text-[10px] font-bold">الرئيسية</span></div>
        <div class="flex flex-col items-center text-gray-400 cursor-pointer"><i data-lucide="search" size="20"></i><span class="text-[10px] font-bold">بحث</span></div>
        <div class="flex flex-col items-center text-gray-400 cursor-pointer"><i data-lucide="user" size="20"></i><span class="text-[10px] font-bold">حسابي</span></div>
    </div>

    <script>
        lucide.createIcons();

        // قاعدة البيانات الموسعة
        const dataStore = {
            flights: [
                "مطار الملك خالد الدولي (RUH) - الرياض",
                "مطار الملك عبدالعزيز الدولي (JED) - جدة",
                "مطار دبي الدولي (DXB) - دبي",
                "مطار هيثرو (LHR) - لندن",
                "مطار القاهرة الدولي (CAI) - القاهرة"
            ],
            hotels: [
                "الرياض، السعودية",
                "دبي، الإمارات",
                "لندن، بريطانيا",
                "باريس، فرنسا"
            ],
            cars: [
                "مطار دبي - صالة 3",
                "فرع وسط المدينة - الرياض"
            ]
        };

        let currentType = 'flights';

        function switchTab(element, type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('tab-active', 'text-blue-900');
                btn.classList.add('bg-white/10', 'text-white');
            });
            element.classList.add('tab-active');
            element.classList.remove('bg-white/10', 'text-white');

            const fromContainer = document.getElementById('from-container');
            const toLabel = document.getElementById('location-label');
            const toInput = document.getElementById('toInput');
            const destIcon = document.getElementById('dest-icon');

            if (type === 'flights') {
                fromContainer.style.display = 'flex';
                toLabel.innerText = 'إلى (المطار)';
                toInput.placeholder = 'مطار الوصول';
                destIcon.setAttribute('data-lucide', 'plane-landing');
            } else {
                fromContainer.style.display = 'none';
                toLabel.innerText = type === 'hotels' ? 'الوجهة أو الفندق' : 'مكان الاستلام';
                toInput.placeholder = type === 'hotels' ? 'أين تريد الإقامة؟' : 'المطار أو الفرع';
                destIcon.setAttribute('data-lucide', type === 'hotels' ? 'hotel' : 'car');
            }
            lucide.createIcons();
        }

        // إعداد القوائم المنسدلة
        ['fromInput', 'toInput'].forEach(id => {
            const input = document.getElementById(id);
            if(!input) return;
            const dropdown = document.createElement('div');
            dropdown.className = "absolute w-full bg-white shadow-2xl rounded-2xl mt-2 hidden z-[100] border border-gray-100 max-h-60 overflow-y-auto";
            input.parentNode.appendChild(dropdown);

            input.addEventListener('focus', () => {
                const list = dataStore[currentType] || dataStore.hotels;
                dropdown.innerHTML = '';
                list.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-4 hover:bg-blue-50 cursor-pointer font-bold text-gray-700 border-b border-gray-50 text-right";
                    div.innerText = item;
                    div.onclick = () => { input.value = item; dropdown.classList.add('hidden'); };
                    dropdown.appendChild(div);
                });
                dropdown.classList.remove('hidden');
            });

            document.addEventListener('click', (e) => {
                if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden');
            });
        });

        function toggleSidebar() {
            // وظيفة فارغة مؤقتاً لعدم وجود Sidebar في هذا التعديل السريع
        }
    </script>
</body>
</html>
