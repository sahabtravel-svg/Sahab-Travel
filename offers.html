<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عروض سحاب ترافل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #005271; --accent: #ff9800; --bg: #f8fafc; }
        body { background-color: var(--bg); font-family: 'Tajawal', sans-serif; margin: 0; padding-bottom: 40px; }
        
        header { background: white; padding: 20px 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .logo { width: 120px; height: auto; }
        
        .nav-links { margin-top: 15px; display: flex; justify-content: center; gap: 20px; }
        .nav-links a { text-decoration: none; color: var(--primary); font-weight: bold; font-size: 14px; }

        .container { padding: 20px; }
        .page-title { text-align: center; color: var(--primary); margin-bottom: 25px; }

        /* تصميم بطاقة العرض */
        .offer-card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .offer-img { width: 100%; height: 200px; object-fit: cover; }
        .offer-details { padding: 15px; }
        .offer-tag { background: var(--accent); color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .offer-title { font-size: 18px; font-weight: bold; margin: 10px 0; color: #333; }
        .offer-price { color: var(--primary); font-size: 20px; font-weight: bold; }
        .offer-price span { font-size: 14px; color: #777; font-weight: normal; }
        
        .btn-book { display: block; background: var(--primary); color: white; text-align: center; padding: 12px; 
                    text-decoration: none; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="سحاب ترافل" class="logo">
    <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="offers.html" style="border-bottom: 2px solid var(--accent);">العروض</a>
        <a href="about.html">من نحن</a>
    </nav>
</header>

<div class="container">
    <h2 class="page-title">أحدث عروضنا ✈️</h2>

    <div class="offer-card">
        <img src="https://images.unsplash.com/photo-1525596662741-e94ff9926de3?w=500" class="offer-img" alt="بالي">
        <div class="offer-details">
            <span class="offer-tag">الأكثر مبيعاً</span>
            <div class="offer-title">بكج بالي - 7 أيام لشخصين</div>
            <div class="offer-price">4,500 <span>ريال</span></div>
            <a href="https://wa.me/966XXXXXXXXX" class="btn-book">احجز الآن عبر الواتساب</a>
        </div>
    </div>

    <div class="offer-card">
        <img src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?w=500" class="offer-img" alt="تركيا">
        <div class="offer-details">
            <span class="offer-tag">عرض الشتاء</span>
            <div class="offer-title">رحلة إسطنبول وصبنجة - 5 أيام</div>
            <div class="offer-price">3,200 <span>ريال</span></div>
            <a href="https://wa.me/966XXXXXXXXX" class="btn-book">احجز الآن عبر الواتساب</a>
        </div>
    </div>

</div>

</body>
</html>
